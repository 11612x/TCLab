<!DOCTYPE html>
<html lang="en" data-ui-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Route Calculator — Arctium Lab</title>
<style>
:root {
  --bg: #0d0f0e;
  --surface: #141714;
  --surface2: #1a1d1a;
  --border: #252825;
  --border-light: #2e322e;
  --text: #e8ede8;
  --text-dim: #b8beb8;
  --text-muted: #949a94;
  --accent: #a8b8a8;
  --accent-dim: #5a6a5a;
  --accent-glow: rgba(168,184,168,0.07);
  --red: #b87878;
  --amber: #b89858;
  --blue: #7898b8;
  --teal: #78b8a8;
  --input-bg: #000000;
}

html[data-ui-theme="light"] {
  --bg: #e8ede8;
  --surface: #dde3dd;
  --surface2: #d3d9d3;
  --border: #b8beb8;
  --border-light: #a8aea8;
  --text: #0d0f0e;
  --text-dim: #2a2e2a;
  --text-muted: #4a504a;
  --accent: #6a8a6a;
  --accent-dim: #4a6a4a;
  --accent-glow: rgba(80, 100, 80, 0.10);
  --input-bg: #ffffff;
}

input:not([type="checkbox"]):not([type="radio"]):not([type="range"]):not([type="file"]):not([type="button"]):not([type="submit"]):not([type="reset"]):not([type="hidden"]):not([type="color"]),
select,
textarea {
  background-color: var(--input-bg);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Consolas', 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}
.banner {
  display: none;
  background: rgba(184,152,88,0.15);
  border-bottom: 1px solid var(--amber);
  color: var(--amber);
  padding: 0.6rem 1.5rem;
  font-size: 0.85rem;
  text-align: center;
}
.banner.visible { display: block; }
.layout {
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 0;
  min-height: 100vh;
}
@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
}
.panel-left {
  border-right: 1px solid var(--border);
  padding: 1rem;
  overflow-y: auto;
}
.panel-right {
  padding: 1rem 1.5rem;
  overflow-y: auto;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1rem;
  margin-bottom: 0.75rem;
}
.card-title {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  margin-bottom: 0.75rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
}
.field { margin-bottom: 0.65rem; position: relative; }
.field label {
  display: block;
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-bottom: 0.25rem;
}
.field input[type="text"],
.field input[type="number"] {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.45rem 0.6rem;
  font-family: inherit;
  font-size: 0.8rem;
  border-radius: 3px;
  -moz-appearance: textfield;
  appearance: textfield;
}
.field input[type="number"]::-webkit-outer-spin-button,
.field input[type="number"]::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
.field input:focus {
  outline: none;
  border-color: var(--accent-dim);
  box-shadow: 0 0 0 2px var(--accent-glow);
}
.field input.port-valid {
  border-color: var(--accent-dim);
}
.port-meta {
  font-size: 0.65rem;
  color: var(--text-muted);
  margin-top: 0.2rem;
  min-height: 1em;
}
.autocomplete-list {
  position: absolute;
  left: 0; right: 0;
  top: 100%;
  z-index: 100;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-top: none;
  max-height: 220px;
  overflow-y: auto;
  display: none;
}
.autocomplete-list.open { display: block; }
.autocomplete-item {
  padding: 0.4rem 0.6rem;
  font-size: 0.75rem;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
}
.autocomplete-item:hover,
.autocomplete-item.active { background: var(--accent-glow); color: var(--accent); }
.autocomplete-empty {
  padding: 0.5rem 0.6rem;
  font-size: 0.75rem;
  color: var(--text-muted);
}
.toggle-group {
  display: flex;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.toggle-btn {
  flex: 1;
  padding: 8px 10px;
  background: var(--surface2);
  border: none;
  color: var(--text-muted);
  font-family: inherit;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.toggle-btn.active {
  background: var(--accent);
  color: #0d0f0e;
  font-weight: 600;
}
.toggle-btn + .toggle-btn { border-left: 1px solid var(--border); }

.spot-actions-wrap {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 0.5rem;
}

.spot-actions {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 46px;
  gap: 8px;
  align-items: center;
}

.spot-actions .run-btn {
  width: 100%;
  min-width: 0;
}

.run-btn {
  background: var(--accent);
  border: none;
  border-radius: 4px;
  color: #0d0f0e;
  cursor: pointer;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.08em;
  padding: 13px;
  text-transform: uppercase;
  transition: opacity 0.15s;
}

.run-btn:hover { opacity: 0.88; }

.run-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.spot-reset-btn {
  align-items: center;
  background: transparent;
  border: 1px solid var(--border-light);
  border-radius: 4px;
  box-sizing: border-box;
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  flex-shrink: 0;
  height: 46px;
  justify-content: center;
  line-height: 1;
  padding: 0;
  transition: opacity 0.15s, border-color 0.15s, color 0.15s;
  width: 46px;
}

.spot-reset-btn svg {
  display: block;
  height: 18px;
  width: 18px;
}

.spot-reset-btn:hover {
  opacity: 0.88;
  border-color: var(--accent-dim);
  color: var(--text);
}
.inline-error {
  color: var(--red);
  font-size: 0.75rem;
  margin-top: 0.5rem;
  display: none;
}
.inline-error.visible { display: block; }
.verdict-box {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 1rem 1.25rem;
  margin-bottom: 0.75rem;
  font-size: 0.9rem;
  color: var(--text-dim);
  border-left: 3px solid var(--accent-dim);
}
.verdict-box strong { color: var(--text); }
.section-title {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin: 0.5rem 0 0.4rem;
}
.summary-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
}
.summary-table td {
  padding: 0.35rem 0;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.summary-table td:first-child { color: var(--text-dim); width: 55%; }
.summary-table td:last-child { text-align: right; color: var(--text); }
.summary-table tr:last-child td { border-bottom: none; }
.summary-table tr.total td { font-weight: bold; border-top: 1px solid var(--border); padding-top: 0.5rem; }
.val-pos { color: var(--accent); }
.val-neg { color: var(--red); }
.val-neu { color: var(--text); }
.eca-low { color: var(--accent); }
.eca-mid { color: var(--amber); }
.eca-high { color: var(--red); }
.route-gc-warn td { color: var(--red); }
.route-gc-warn td:last-child { font-weight: bold; }
.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 300px;
  color: var(--text-muted);
  font-size: 0.85rem;
  border: 1px dashed var(--border);
  border-radius: 4px;
}
.mrv-warning {
  color: var(--amber);
  font-size: 0.8rem;
  padding: 0.75rem;
  background: rgba(184,152,88,0.08);
  border: 1px solid var(--amber);
  border-radius: 3px;
  margin-bottom: 0.75rem;
}
.estimate-note {
  color: var(--text-muted);
  font-size: 0.72rem;
  line-height: 1.45;
  margin-top: 0.75rem;
  padding: 0.6rem 0.75rem;
  border: 1px dashed var(--border);
  border-radius: 3px;
}

.route-port-label-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
  margin-bottom: 0.25rem;
}

.route-port-label-row label {
  margin-bottom: 0;
}

.route-port-remove {
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 1.1rem;
  line-height: 1;
  padding: 0 0.2rem;
  transition: color 0.15s;
}

.route-port-remove:hover {
  color: var(--red);
}

.route-add-port-btn {
  background: transparent;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-family: inherit;
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  margin: 0.15rem 0 0.5rem;
  padding: 0;
  text-transform: uppercase;
  transition: color 0.15s;
}

.route-add-port-btn:hover:not(:disabled) {
  color: var(--accent);
}

.route-add-port-btn:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.route-map-card {
  margin-top: 0.75rem;
}

.route-voyage-map {
  border: 1px solid var(--border);
  border-radius: 4px;
  height: 360px;
  margin-top: 0.5rem;
  width: 100%;
}

.route-voyage-map .leaflet-container {
  background: var(--surface2);
  border-radius: 4px;
  font-family: inherit;
}

.route-map-caption {
  color: var(--text-muted);
  font-size: 0.72rem;
  margin-top: 0.5rem;
}

.banner.file-protocol-banner {
  background: rgba(184, 120, 120, 0.12);
  border-bottom: 1px solid var(--red);
  color: var(--text);
  display: none;
}

.banner.file-protocol-banner.visible {
  display: block;
}

.banner.file-protocol-banner code {
  color: var(--accent);
  font-size: 0.7rem;
}
</style>

<script type="module">
  let searouteMod;
  try {
    searouteMod = await import('https://esm.sh/searoute-ts@2.0.0');
  } catch (e) {
    console.warn('[route] esm.sh failed, trying jsDelivr', e);
    searouteMod = await import('https://cdn.jsdelivr.net/npm/searoute-ts@2.0.0/+esm');
  }
  const searoute = searouteMod.default ?? searouteMod.searoute;
  const clearFinderCache = searouteMod.clearFinderCache;
  const searouteAlternatives = searouteMod.seaRouteAlternatives ?? searouteMod.searouteAlternatives;
  window.searoute = searoute;
  window.searouteAlternatives = searouteAlternatives;
  window.clearSearouteCache = clearFinderCache;
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'route-engine.js';
    s.onload = () => resolve();
    s.onerror = () => reject(new Error('route-engine.js failed to load'));
    document.head.appendChild(s);
  });
  window.dispatchEvent(new Event('searoute-ready'));
</script>
<script>


const PASSAGE_LABELS = {
  suez: 'Suez',
  panama: 'Panama',
  gibraltar: 'Gibraltar',
  babelmandeb: 'Bab-el-Mandeb',
  babalmandab: 'Bab-el-Mandeb',
  malacca: 'Malacca',
  dover: 'Dover',
  kiel: 'Kiel',
  corinth: 'Corinth',
  bering: 'Bering',
  magellan: 'Magellan',
  northwest: 'Northwest Passage',
  northeast: 'Northeast Passage',
  bosporus: 'Bosporus',
  ormuz: 'Hormuz',
  sunda: 'Sunda',
  cape_horn: 'Cape Horn',
};

function formatPassages(passages) {
  if (!passages?.length) return 'None';
  return passages.map(p => PASSAGE_LABELS[p] || p).join(' / ');
}

function isValidPort(p) {
  if (window.ArctiumRouteEngine?.isValidPort?.(p)) return true;
  if (!p) return false;
  const lat = Number(p.lat);
  const lon = Number(p.lon);
  if (!Number.isFinite(lat) || !Number.isFinite(lon)) return false;
  if (Math.abs(lat) < 0.01 && Math.abs(lon) < 0.01) return false;
  if (lat < -90 || lat > 90 || lon < -180 || lon > 180) return false;
  return true;
}

function portLabel(p) {
  return `${(p.name || p.port_name_full).toUpperCase()} — ${p.port_country || ''}`;
}

function portSearchKeys(p) {
  const keys = new Set();
  if (p.name) keys.add(p.name.toLowerCase().trim());
  if (p.port_name_full) keys.add(p.port_name_full.toLowerCase().trim());
  keys.add(portLabel(p).toLowerCase());
  return keys;
}

function dedupePorts(ports) {
  const byName = new Map();
  for (const p of ports) {
    if (!isValidPort(p)) continue;
    const key = (p.name || p.port_name_full || '').toLowerCase().trim();
    if (!key) continue;
    const existing = byName.get(key);
    if (!existing || (Math.abs(p.lat) + Math.abs(p.lon) > Math.abs(existing.lat) + Math.abs(existing.lon))) {
      byName.set(key, p);
    }
  }
  return [...byName.values()].sort((a, b) =>
    (a.name || '').localeCompare(b.name || '', undefined, { sensitivity: 'base' })
  );
}

function findExactPort(inputVal) {
  const v = inputVal.trim().toLowerCase();
  if (!v) return null;
  const matches = PORTS.filter(p => portSearchKeys(p).has(v));
  if (matches.length === 1) return matches[0];
  return null;
}

function portMatchesSelection(p, inputVal) {
  if (!p || !isValidPort(p)) return false;
  return portSearchKeys(p).has(inputVal.trim().toLowerCase());
}

let PORTS = [];
const MAX_ROUTE_PORTS = 5;
let routePorts = [null, null];
let routeMap = null;
let routeMapLayers = null;

function geoLoadHint() {
  if (window.location.protocol !== 'file:') return '';
  return ' Serve over HTTP: run serve.bat or python -m http.server 8080, then open http://127.0.0.1:8080/.';
}

function showFileProtocolBanner() {
  if (window.location.protocol !== 'file:') return;
  document.getElementById('file-protocol-banner')?.classList.add('visible');
}

function destroyRouteMap() {
  if (routeMap) {
    routeMap.remove();
    routeMap = null;
    routeMapLayers = null;
  }
}

function renderRouteMap(container, { waypoints, ports, totalNM }) {
  if (!waypoints?.length || typeof L === 'undefined' || !container) return;

  const latlngs = waypoints.map(c => [c[1], c[0]]);
  const routeLabel = (ports || []).filter(isValidPort).map(portDisplayName).join(' → ');
  const distLabel = totalNM != null ? fmtNM(totalNM) : '';

  const wrap = document.createElement('div');
  wrap.className = 'card route-map-card';
  wrap.innerHTML = `
    <div class="card-title">Voyage Route</div>
    <div class="route-voyage-map" id="route-voyage-map"></div>
    <div class="route-map-caption">${routeLabel || 'Route'}${distLabel ? ' · ' + distLabel : ''}</div>
  `;
  container.appendChild(wrap);

  const mapEl = document.getElementById('route-voyage-map');
  if (!mapEl) return;

  const maxLat = window.ArctiumRouteEngine?.MAX_ROUTE_LAT_N ?? 70;
  const minLat = window.ArctiumRouteEngine?.MIN_ROUTE_LAT_S ?? -60;
  routeMap = L.map(mapEl, {
    zoomControl: true,
    maxBounds: [[minLat, -180], [maxLat, 180]],
    maxBoundsViscosity: 1,
  });
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    referrerPolicy: 'strict-origin-when-cross-origin',
  }).addTo(routeMap);

  routeMapLayers = L.layerGroup().addTo(routeMap);

  L.polyline(latlngs, {
    color: '#78b8a8',
    weight: 2.5,
    opacity: 0.9,
  }).addTo(routeMapLayers);

  const validPorts = (ports || []).filter(isValidPort);
  const markerOpts = { radius: 6, weight: 2, fillOpacity: 0.9 };
  validPorts.forEach((port, i) => {
    const lat = Number(port.lat);
    const lon = Number(port.lon);
    if (!Number.isFinite(lat) || !Number.isFinite(lon)) return;
    const isFirst = i === 0;
    const isLast = i === validPorts.length - 1;
    const color = isFirst ? '#9ab89a' : isLast ? '#b8a89a' : '#b8b878';
    const fillColor = isFirst ? '#6a8a6a' : isLast ? '#8a7a6a' : '#8a8a5a';
    L.circleMarker([lat, lon], { ...markerOpts, color, fillColor })
      .bindTooltip(portDisplayName(port), { direction: 'top', offset: [0, -6] })
      .addTo(routeMapLayers);
  });

  const bounds = L.latLngBounds(latlngs);
  routeMap.fitBounds(bounds, { padding: [28, 28], maxZoom: 8 });
  requestAnimationFrame(() => {
    routeMap?.invalidateSize();
    routeMap?.fitBounds(bounds, { padding: [28, 28], maxZoom: 8 });
  });
}
let suezToggle = 'use', panamaToggle = 'use';

function loadPorts() {
  try {
    const data = window.ARCTIUM_PORTS;
    if (!Array.isArray(data) || !data.length) throw new Error('ports.js not loaded');
    PORTS = dedupePorts(data.filter(p => !p.is_inactive));
  } catch (e) {
    document.getElementById('port-banner').classList.add('visible');
  }
}

function fmtNM(n) { return n.toLocaleString('en-US', { maximumFractionDigits: 0 }) + ' NM'; }
function fmtNum(n, d = 1) { return n.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d }); }
function fmtMoney(n) { return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 }); }
function ecaClass(pct) {
  if (pct < 20) return 'eca-low';
  if (pct <= 40) return 'eca-mid';
  return 'eca-high';
}

const GC_DETOUR_WARN_PCT = 10;

function gcDetourPct(routeNM, gcNM) {
  if (gcNM == null || !Number.isFinite(routeNM) || !Number.isFinite(gcNM) || gcNM <= 0) return 0;
  return (Math.abs(routeNM - gcNM) / gcNM) * 100;
}

function gcDetourWarnClass(routeNM, gcNM) {
  if (gcNM == null) return '';
  return gcDetourPct(routeNM, gcNM) > GC_DETOUR_WARN_PCT ? 'route-gc-warn' : '';
}

function showError(msg) {
  const el = document.getElementById('input-error');
  el.textContent = msg + geoLoadHint();
  el.classList.add('visible');
}
function clearError() { document.getElementById('input-error').classList.remove('visible'); }

function setupToggle(id, setter) {
  const group = document.getElementById(id);
  group.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      group.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      setter(btn.dataset.value);
    });
  });
}

function setToggleUi(id, value) {
  const group = document.getElementById(id);
  if (!group) return;
  group.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.value === value);
  });
}

function routePortFieldLabel(index) {
  if (index === 0) return 'Load Port';
  if (index === 1) return 'Discharge Port';
  return `Port ${index + 1}`;
}

function portMetaText(p) {
  if (!p || !isValidPort(p)) return '';
  const draft = p.draft != null ? p.draft.toFixed(1) : '—';
  return `lat: ${Number(p.lat).toFixed(2)}  lon: ${Number(p.lon).toFixed(2)}  draft: ${draft} m`;
}

function renderRoutePortFields() {
  const container = document.getElementById('route-ports-list');
  const addBtn = document.getElementById('route-add-port-btn');
  if (!container) return;

  container.innerHTML = '';
  routePorts.forEach((port, index) => {
    const field = document.createElement('div');
    field.className = 'field route-port-field';

    const labelRow = document.createElement('div');
    labelRow.className = 'route-port-label-row';

    const label = document.createElement('label');
    label.htmlFor = `route-port-input-${index}`;
    label.textContent = routePortFieldLabel(index);
    labelRow.appendChild(label);

    if (index >= 2) {
      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'route-port-remove';
      removeBtn.dataset.index = String(index);
      removeBtn.setAttribute('aria-label', 'Remove port');
      removeBtn.textContent = '×';
      labelRow.appendChild(removeBtn);
    }

    const input = document.createElement('input');
    input.type = 'text';
    input.id = `route-port-input-${index}`;
    input.autocomplete = 'off';
    input.placeholder = 'Search port…';
    if (port) {
      input.value = portLabel(port);
      input.classList.add('port-valid');
    }

    const meta = document.createElement('div');
    meta.className = 'port-meta';
    meta.id = `route-port-meta-${index}`;
    meta.textContent = portMetaText(port);

    const list = document.createElement('div');
    list.className = 'autocomplete-list';
    list.id = `route-port-list-${index}`;

    field.appendChild(labelRow);
    field.appendChild(input);
    field.appendChild(meta);
    field.appendChild(list);
    container.appendChild(field);

    setupRoutePortAutocomplete(index);
  });

  if (addBtn) {
    const atMax = routePorts.length >= MAX_ROUTE_PORTS;
    addBtn.disabled = atMax;
    addBtn.hidden = atMax;
  }
}

function addRoutePort() {
  if (routePorts.length >= MAX_ROUTE_PORTS) return;
  routePorts.push(null);
  renderRoutePortFields();
}

function removeRoutePort(index) {
  if (index < 2 || routePorts.length <= 2) return;
  routePorts.splice(index, 1);
  renderRoutePortFields();
}

function setupRoutePortAutocomplete(index) {
  setupAutocomplete(
    `route-port-input-${index}`,
    `route-port-list-${index}`,
    `route-port-meta-${index}`,
    p => { routePorts[index] = p; },
    () => routePorts[index]
  );
}

function syncRoutePortsFromInputs() {
  routePorts.forEach((port, index) => {
    const input = document.getElementById(`route-port-input-${index}`);
    if (!input) return;
    if (port && portMatchesSelection(port, input.value)) return;
    const exact = findExactPort(input.value);
    routePorts[index] = exact && isValidPort(exact) ? exact : null;
  });
}

function portDisplayName(p) {
  return (p.name || p.port_name_full).toUpperCase();
}

function resetRouteCalculator() {
  destroyRouteMap();
  routePorts = [null, null];
  renderRoutePortFields();

  suezToggle = 'use';
  panamaToggle = 'use';
  setToggleUi('suez-toggle', 'use');
  setToggleUi('panama-toggle', 'use');

  document.getElementById('speed').value = '12.5';
  document.getElementById('vlsfo-rate').value = '25';
  document.getElementById('lsmgo-rate').value = '25';
  document.getElementById('vlsfo-price').value = '500';
  document.getElementById('lsmgo-price').value = '650';
  document.getElementById('port-days').value = '1.5';

  clearError();
  document.getElementById('empty-state').style.display = '';
  const content = document.getElementById('results-content');
  content.style.display = 'none';
  content.innerHTML = '';
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function portMatchScore(p, ql) {
  const name = (p.name || '').toLowerCase();
  const full = (p.port_name_full || '').toLowerCase();
  const country = (p.port_country || '').toLowerCase();

  function scoreText(text, w) {
    if (!text || !text.includes(ql)) return 0;
    if (text === ql) return w.exact;
    if (text.startsWith(ql)) return w.prefix;
    const wordRe = new RegExp('(?:^|[\\s(/-])' + escapeRegex(ql), 'i');
    if (wordRe.test(text)) return w.wordStart;
    return w.includes;
  }

  const nameW = { exact: 10000, prefix: 5000, wordStart: 3000, includes: 400 };
  const fullW = { exact: 2000, prefix: 1500, wordStart: 900, includes: 150 };
  const countryW = { exact: 200, prefix: 150, wordStart: 100, includes: 50 };

  let score = Math.max(
    scoreText(name, nameW),
    scoreText(full, fullW),
    scoreText(country, countryW)
  );
  if (score <= 0) return 0;

  const parenIdx = name.indexOf('(');
  if (parenIdx >= 0) {
    const before = name.slice(0, parenIdx);
    const inside = name.slice(parenIdx);
    if (!before.includes(ql) && inside.includes(ql) && scoreText(name, nameW) <= nameW.wordStart) {
      score -= 2500;
    }
  }
  if (scoreText(name, nameW) === 0 && scoreText(full, fullW) > 0 && scoreText(full, fullW) < fullW.wordStart) {
    score -= 500;
  }
  return Math.max(score, 1);
}

function filterPorts(q) {
  const ql = q.trim().toLowerCase();
  if (ql.length < 2) return [];
  const scored = [];
  for (const p of PORTS) {
    const s = portMatchScore(p, ql);
    if (s > 0) scored.push({ p, s });
  }
  scored.sort((a, b) => {
    if (b.s !== a.s) return b.s - a.s;
    const an = (a.p.name || a.p.port_name_full || '').length;
    const bn = (b.p.name || b.p.port_name_full || '').length;
    if (an !== bn) return an - bn;
    return (a.p.name || '').localeCompare(b.p.name || '', undefined, { sensitivity: 'base' });
  });
  return scored.slice(0, 10).map(x => x.p);
}

function positionAutocompleteList(input, list) {
  const rect = input.getBoundingClientRect();
  list.classList.add('port-ac-list--floating');
  list.style.position = 'fixed';
  list.style.left = `${rect.left}px`;
  list.style.top = `${rect.bottom}px`;
  list.style.width = `${Math.max(rect.width, 200)}px`;
  list.style.right = 'auto';
  list.style.zIndex = '25000';
}

function resetAutocompleteListPosition(list) {
  list.classList.remove('port-ac-list--floating');
  list.style.position = '';
  list.style.left = '';
  list.style.top = '';
  list.style.width = '';
  list.style.right = '';
  list.style.zIndex = '';
}

function setupAutocomplete(inputId, listId, metaId, setPort, getPort) {
  const input = document.getElementById(inputId);
  const list = document.getElementById(listId);
  const meta = document.getElementById(metaId);
  let activeIdx = -1;
  let lastMatches = [];

  function closeList() {
    list.innerHTML = '';
    list.classList.remove('open');
    resetAutocompleteListPosition(list);
    activeIdx = -1;
    lastMatches = [];
  }

  function render(matches) {
    lastMatches = matches;
    list.innerHTML = '';
    if (!matches.length) {
      list.innerHTML = '<div class="autocomplete-empty">No ports found</div>';
      positionAutocompleteList(input, list);
      list.classList.add('open');
      return;
    }
    matches.forEach((p, i) => {
      const div = document.createElement('div');
      div.className = 'autocomplete-item';
      div.textContent = portLabel(p);
      div.addEventListener('mousedown', (e) => {
        e.preventDefault();
        selectPort(p);
      });
      list.appendChild(div);
    });
    positionAutocompleteList(input, list);
    list.classList.add('open');
    activeIdx = -1;
  }

  function clearSelection() {
    setPort(null);
    meta.textContent = '';
    input.classList.remove('port-valid');
  }

  function selectPort(p) {
    if (!isValidPort(p)) return;
    console.log(`[${inputId}] Port selected:`, p);
    setPort(p);
    input.value = portLabel(p);
    input.classList.add('port-valid');
    const draft = p.draft != null ? p.draft.toFixed(1) : '—';
    meta.textContent = `lat: ${Number(p.lat).toFixed(2)}  lon: ${Number(p.lon).toFixed(2)}  draft: ${draft} m`;
    closeList();
    clearError();
  }

  function syncFromInput() {
    const exact = findExactPort(input.value);
    if (exact) {
      selectPort(exact);
      return true;
    }
    const p = getPort();
    if (p && portMatchesSelection(p, input.value)) return true;
    clearSelection();
    return false;
  }

  function updateActive() {
    const items = list.querySelectorAll('.autocomplete-item');
    items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
    if (activeIdx >= 0 && items[activeIdx]) items[activeIdx].scrollIntoView({ block: 'nearest' });
  }

  input.addEventListener('input', () => {
    const p = getPort();
    if (p && portMatchesSelection(p, input.value)) {
      input.classList.add('port-valid');
      closeList();
      return;
    }
    input.classList.remove('port-valid');
    if (p && !portMatchesSelection(p, input.value)) clearSelection();
    if (input.value.length < 2) {
      closeList();
      return;
    }
    render(filterPorts(input.value));
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (list.classList.contains('open') && activeIdx >= 0 && lastMatches[activeIdx]) {
        selectPort(lastMatches[activeIdx]);
      } else if (lastMatches.length === 1) {
        selectPort(lastMatches[0]);
      } else {
        syncFromInput();
      }
      return;
    }
    const items = list.querySelectorAll('.autocomplete-item');
    if (!list.classList.contains('open') || !items.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx + 1, items.length - 1); updateActive(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx - 1, 0); updateActive(); }
    else if (e.key === 'Escape') list.classList.remove('open');
  });

  input.addEventListener('blur', () => {
    setTimeout(() => {
      closeList();
      syncFromInput();
    }, 150);
  });
}

function debugRoute(waypoints, ctx = {}) {
  console.log('route debug:', {
    waypointCount: waypoints?.length ?? 0,
    routeNM: ctx.routeNM != null ? ctx.routeNM.toFixed(1) : 'n/a',
    greatCircleNM: ctx.gcNM != null ? ctx.gcNM.toFixed(1) : 'n/a',
    passages: ctx.passages,
    restrictions: ctx.restrictions,
  });
}

async function calculateRoute() {
  clearError();
  const engine = window.ArctiumRouteEngine;
  if (!engine) {
    showError('Route engine not loaded. Refresh the page.');
    return;
  }

  const ready = await engine.ready;
  if (!ready || !engine.isReady()) {
    showError(window.ArctiumGeo?.error || 'Routing engine or geo layers failed to load. Refresh the page.');
    return;
  }

  syncRoutePortsFromInputs();

  const ports = routePorts.filter(isValidPort);
  if (ports.length !== routePorts.length) {
    showError('Select every port from the dropdown');
    return;
  }
  if (ports.length < 2) {
    showError('Add at least a load and discharge port');
    return;
  }

  const run = typeof withArcLoading === 'function' ? withArcLoading : async (task) => task();
  await run(async () => {
    const speed = parseFloat(document.getElementById('speed').value) || 12.5;
    const vlsfoRate = parseFloat(document.getElementById('vlsfo-rate').value) || 25;
    const lsmgoRate = parseFloat(document.getElementById('lsmgo-rate').value) || 25;
    const vlsfoPrice = parseFloat(document.getElementById('vlsfo-price').value) || 500;
    const lsmgoPrice = parseFloat(document.getElementById('lsmgo-price').value) || 650;
    const portDaysTotal = parseFloat(document.getElementById('port-days').value) || 1.5;

    const suez = suezToggle === 'use';
    const panama = panamaToggle === 'use';
    const canalOpts = { suez, panama };

    const route = await engine.calculateMultiLegRoute(ports, canalOpts);
    if (route.error) {
      renderError(route.error);
      return;
    }

    debugRoute(route.waypoints, {
      routeNM: route.totalNM,
      gcNM: route.gcNM,
      passages: route.passages,
      restrictions: [
        ...(!suez ? ['suez'] : []),
        ...(!panama ? ['panama'] : []),
      ],
    });

    const { totalNM, gcNM, ecaNM, nonEcaNM, zonesHit, legResults, passages } = route;
    const fuel = engine.computeSeaFuelMTSplit({
      nonEcaNM,
      ecaNM,
      speedKn: speed,
      vlsfoMtPerDay: vlsfoRate,
      lsmgoMtPerDay: lsmgoRate,
    });
    const seaDays = fuel.seaDays;
    const totalDays = seaDays + portDaysTotal;
    const vlsfoSeaMT = fuel.vlsfoMT;
    const lsmgoSeaMT = fuel.lsmgoSeaMT;
    const lsmgoPortMT = portDaysTotal * 2.5;
    const totalFuelMT = vlsfoSeaMT + lsmgoSeaMT + lsmgoPortMT;
    const vlsfoCost = vlsfoSeaMT * vlsfoPrice;
    const lsmgoCost = (lsmgoSeaMT + lsmgoPortMT) * lsmgoPrice;
    const totalCost = vlsfoCost + lsmgoCost;
    const ecaPct = totalNM > 0 ? (ecaNM / totalNM) * 100 : 0;
    const canalsLabel = formatPassages(passages);
    const isMrv = ports.some(p => p.ismrv === 'Y');

    renderResults({
      ports, legResults, waypoints: route.waypoints, totalNM, gcNM, ecaNM, nonEcaNM, ecaPct, zonesHit, canalsLabel,
      speed, seaDays, portDaysTotal, totalDays,
      vlsfoSeaMT, lsmgoSeaMT, lsmgoPortMT, totalFuelMT,
      vlsfoCost, lsmgoCost, totalCost, isMrv,
    });
  });
}

function renderError(msg) {
  destroyRouteMap();
  document.getElementById('empty-state').style.display = 'none';
  const content = document.getElementById('results-content');
  content.style.display = 'block';
  content.innerHTML = `<div class="verdict-box" style="border-left-color:var(--red);color:var(--red)">${msg}${geoLoadHint()}</div>`;
}

function renderResults(d) {
  destroyRouteMap();
  document.getElementById('empty-state').style.display = 'none';
  const content = document.getElementById('results-content');
  content.style.display = 'block';
  const routeLabel = d.ports.map(portDisplayName).join(' → ');
  const zones = d.zonesHit.length ? d.zonesHit.join(', ') : 'None';
  const ecaPctFmt = fmtNum(d.ecaPct, 1);
  const ecaPctClass = ecaClass(d.ecaPct);
  const hasGc = d.gcNM != null && Number.isFinite(d.gcNM);
  const gcWarn = hasGc ? gcDetourWarnClass(d.totalNM, d.gcNM) : '';
  const gcDiffFmt = hasGc ? fmtNum(gcDetourPct(d.totalNM, d.gcNM), 1) : '';
  const totalDistanceLabel = gcWarn
    ? `Total Distance <span class="eca-high">(${gcDiffFmt}% vs great circle)</span>`
    : 'Total Distance';
  const avgRouteGcNM = hasGc ? (d.totalNM + d.gcNM) / 2 : null;

  let html = '';
  if (d.isMrv) {
    html += `<div class="mrv-warning">⚠ EU MRV-relevant port detected — EU ETS and FuelEU obligations may apply</div>`;
  }
  html += `<div class="verdict-box"><strong>${routeLabel}</strong> | ${fmtNM(d.totalNM)} total | ${fmtNum(d.totalDays)} days | <span class="${ecaPctClass}">${ecaPctFmt}% ECA exposure</span></div>`;

  if (d.legResults?.length > 1) {
    html += `<div class="card"><div class="card-title">Leg Distances</div><table class="summary-table">`;
    d.legResults.forEach((leg, i) => {
      const legHasGc = leg.gcNM != null && Number.isFinite(leg.gcNM);
      const legWarn = legHasGc ? gcDetourWarnClass(leg.routeNM, leg.gcNM) : '';
      const legDetour = legHasGc ? fmtNum(gcDetourPct(leg.routeNM, leg.gcNM), 1) : '';
      const legSuffix = legWarn ? ` <span class="eca-high">(+${legDetour}% vs GC)</span>` : '';
      html += `<tr class="${legWarn}"><td>Leg ${i + 1}: ${portDisplayName(leg.fromPort)} → ${portDisplayName(leg.toPort)}</td><td>${fmtNM(leg.routeNM)}${legSuffix}</td></tr>`;
    });
    html += `</table></div>`;
  }

  html += `<div class="card"><div class="card-title">Distance Breakdown</div><table class="summary-table">
    <tr class="${gcWarn}"><td>${totalDistanceLabel}</td><td>${fmtNM(d.totalNM)}</td></tr>`;
  if (hasGc) {
    html += `<tr class="${gcWarn}"><td>Great Circle (sum of legs)</td><td>${fmtNM(d.gcNM)}</td></tr>
    <tr><td>Average (route &amp; great circle)</td><td>${fmtNM(avgRouteGcNM)}</td></tr>`;
  }
  html += `<tr><td>ECA Distance</td><td class="${ecaPctClass}">${fmtNM(d.ecaNM)} (${ecaPctFmt}%)</td></tr>
    <tr><td>Non-ECA Distance</td><td>${fmtNM(d.nonEcaNM)} (${fmtNum(100 - d.ecaPct, 1)}%)</td></tr>
    <tr><td>Canals Used</td><td>${d.canalsLabel}</td></tr>
    <tr><td>ECA Zones Crossed</td><td style="text-align:right;font-size:0.75rem">${zones}</td></tr>
  </table></div>`;

  html += `<div class="card"><div class="card-title">Voyage Duration</div><table class="summary-table">
    <tr><td>Speed</td><td>${fmtNum(d.speed)} kn</td></tr>
    <tr><td>Sea Days</td><td>${fmtNum(d.seaDays)} days</td></tr>
    <tr><td>Port Days</td><td>${fmtNum(d.portDaysTotal, d.portDaysTotal % 1 === 0 ? 0 : 1)} days</td></tr>
    <tr><td>Total Days</td><td>${fmtNum(d.totalDays)} days</td></tr>
  </table></div>`;

  html += `<div class="card"><div class="card-title">Bunker Consumption</div><table class="summary-table">
    <tr><td>VLSFO (non-ECA sea)</td><td>${fmtNum(d.vlsfoSeaMT)} mt</td></tr>
    <tr><td>LSMGO (ECA sea)</td><td>${fmtNum(d.lsmgoSeaMT)} mt</td></tr>
    <tr><td>LSMGO (port days)</td><td>${fmtNum(d.lsmgoPortMT)} mt</td></tr>
    <tr class="total"><td>Total Fuel</td><td>${fmtNum(d.totalFuelMT)} mt</td></tr>
    <tr><td>VLSFO Cost</td><td>${fmtMoney(d.vlsfoCost)}</td></tr>
    <tr><td>LSMGO Cost</td><td>${fmtMoney(d.lsmgoCost)}</td></tr>
    <tr class="total"><td>Total Bunker Cost</td><td>${fmtMoney(d.totalCost)}</td></tr>
  </table></div>`;

  html += `<p class="estimate-note">All figures above are rough estimates for planning only — not for navigation, charter party, or regulatory compliance. Sea distance uses the 2 km waterway network; ECA exposure is sampled along the route; bunker and cost assume fixed rates and speed.</p>`;

  content.innerHTML = html;

  if (d.waypoints?.length) {
    renderRouteMap(content, {
      waypoints: d.waypoints,
      ports: d.ports,
      totalNM: d.totalNM,
    });
  }
}

setupToggle('suez-toggle', v => { suezToggle = v; });
setupToggle('panama-toggle', v => { panamaToggle = v; });
document.getElementById('route-add-port-btn').addEventListener('click', addRoutePort);
document.getElementById('route-ports-list').addEventListener('click', (e) => {
  const btn = e.target.closest('.route-port-remove');
  if (!btn) return;
  removeRoutePort(Number(btn.dataset.index));
});
document.getElementById('run-btn').addEventListener('click', calculateRoute);
document.getElementById('route-reset-btn').addEventListener('click', resetRouteCalculator);

function receiveUiState(data) {
  if (!data || data.type !== 'arctium-ui') return;
  document.documentElement.setAttribute('data-ui-theme', data.theme === 'light' ? 'light' : 'dark');
}

window.addEventListener('message', (e) => receiveUiState(e.data));

showFileProtocolBanner();
loadPorts();
renderRoutePortFields();

async function initRouteCalculator() {
  const btn = document.getElementById('run-btn');
  const engine = window.ArctiumRouteEngine;
  if (!engine) return false;
  btn.disabled = true;
  btn.textContent = 'Loading geo…';
  const ok = await engine.ready;
  console.log(`[route-calculator] engine ready: ${ok}, geo: ${window.ArctiumGeo?.isReady?.()}`);
  console.log(`[ports] Loaded ${PORTS.length} valid ports`);
  if (!ok || !engine.isReady()) {
    btn.disabled = true;
    btn.textContent = 'Geo / routing unavailable';
    const geoErr = window.ArctiumGeo?.error;
    showError(geoErr || 'Maritime geo layers or routing engine failed to load. Refresh the page.');
    return false;
  }
  btn.disabled = false;
  btn.textContent = 'Calculate Route';
  clearError();
  return true;
}

async function bootRouteCalculator() {
  if (!window.ArctiumRouteEngine) {
    const btn = document.getElementById('run-btn');
    btn.disabled = true;
    btn.textContent = 'Routing engine unavailable';
    showError('Route engine scripts failed to load. Refresh the page.');
    return;
  }
  await initRouteCalculator();
  if (window.parent !== window) {
    window.parent.postMessage({ type: 'arctium-route-ready' }, '*');
  }
}

function startRouteBoot() {
  if (window.ArctiumRouteEngine) {
    void bootRouteCalculator();
    return;
  }
  const tryBoot = () => {
    if (window.ArctiumRouteEngine) void bootRouteCalculator();
  };
  window.addEventListener('searoute-ready', tryBoot, { once: true });
  const poll = setInterval(() => {
    if (window.ArctiumRouteEngine) {
      clearInterval(poll);
      void bootRouteCalculator();
    }
  }, 50);
  setTimeout(() => clearInterval(poll), 120000);
}

startRouteBoot();
window.addEventListener('arctium-geo-ready', () => void initRouteCalculator());
